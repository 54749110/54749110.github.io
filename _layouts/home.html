    body {
        background-image: url("mypicture.jpg"); /* 图片文件名 */
        background-repeat: no-repeat;
        background-size: cover;
    }
</style>

  {%- if page.title -%}
    <h1 class="page-heading">{{ page.title }}</h1>
  {%- endif -%}

  {{ content }}


  {% if site.paginate %}
    {% assign posts = paginator.posts %}
  {% else %}
    {% assign posts = site.posts %}
  {% endif %}

<body>
    
      <!-- Header -->
      <header class="header flex" role="banner">
          <div class="container animated fadeIn">
              <div class="row">
                      <a href="{{ site.url }}">
                          <img src="mypicture.jpg" class="img-circle zoombtn animated rotateIn">
                      </a>
                      <h3 class="title">
                          <a class="zoombtn" href="{{ site.url }}">
                            <p style="font-size:1.2rem;font-weight:300">{{ site.title }}</p>
                    </a>
                      </h3>
                      <hr class="hr-line">
                      <h3 class="title">
                          <a href="{{ site.url }}">
                            <p style="font-size:1rem;font-weight:300">{{ site.bio }}</p>
                    </a>
                      </h3>
                    <hr class="hr-line">
                    <h3 class="title">
                           <a class="btn zoombtn" href="{{ site.url }}/about">
                           About
                           </a>
                           <a class="btn zoombtn" href="{{ site.url }}/life">
                           Life
                           </a>
                           <a class="btn zoombtn" href="{{ site.url }}/projects">
                           Projects
                           </a>
                           <a class="btn zoombtn" href="{{ site.url }}/study">
                          Study
                   </h3>
              </div>
          </div>
      </header>
      
</body>


</div>
